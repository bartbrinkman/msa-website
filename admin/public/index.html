<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MSA Carousel Admin</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>MSA Carousel Admin</h1>
    <div id="status" class="status"></div>
  </header>

  <main>
    <aside class="sidebar">
      <section>
        <h2>Carousels</h2>
        <ul id="carousel-list"></ul>
        <form id="new-carousel-form" class="inline-form">
          <input type="text" id="new-carousel-id" placeholder="new-carousel-id" pattern="[a-z0-9_-]+" required />
          <button type="submit">Add</button>
        </form>
      </section>
    </aside>

    <section class="editor" id="editor-pane">
      <div id="editor-empty" class="empty">Select a carousel on the left.</div>
      <div id="editor" hidden>
        <div class="editor-header">
          <div>
            <h2 id="editor-title"></h2>
            <p id="editor-subtitle" class="hint"></p>
          </div>
          <div class="editor-actions">
            <button id="save-btn" class="primary">Save</button>
          </div>
        </div>
        <ol id="slides"></ol>
        <div id="slides-hint" class="hint" hidden>Drag images from the Pending tray →</div>
      </div>
    </section>

    <aside class="pending-rail" id="pending-rail">
      <header>
        <h2>Pending <span id="pending-count" class="count"></span></h2>
      </header>
      <p class="hint">Drag onto a carousel row to add, or drag a slide here to remove. Run <code>npm run resize</code> to shrink these to 2000px max.</p>
      <div id="pending-grid" class="pending-grid"></div>
    </aside>
  </main>

  <div id="lightbox" class="lightbox" hidden><img alt="" /></div>

  <script src="/app.js"></script>
</body>
</html>
